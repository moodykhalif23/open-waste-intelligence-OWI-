name: owi

x-owi-env: &owi-env
  OWI_ENVIRONMENT: production
  OWI_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  OWI_REDIS_URL: redis://redis:6379/0
  OWI_STORAGE_DRIVER: s3
  OWI_S3_ENDPOINT: minio:9000
  OWI_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
  OWI_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  OWI_JWT_SECRET: ${OWI_JWT_SECRET}

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 12

  labelstudio:
    image: heartexlabs/label-studio:latest
    environment:
      LABEL_STUDIO_USERNAME: ${LABEL_STUDIO_USERNAME}
      LABEL_STUDIO_PASSWORD: ${LABEL_STUDIO_PASSWORD}
      LABEL_STUDIO_USER_TOKEN: ${LABEL_STUDIO_USER_TOKEN}
      # Scripted access uses the preset token above; JWT PATs stay available in the UI.
      LABEL_STUDIO_LEGACY_API_TOKENS_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ls-data:/label-studio/data

  api:
    build: ./api
    profiles: [prod]
    environment: *owi-env
    command: sh -c "uv run alembic upgrade head && uv run uvicorn owi_api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: ./api
    profiles: [prod]
    environment: *owi-env
    command: uv run rq worker inference --url redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  scheduler:
    build: ./api
    profiles: [prod]
    environment: *owi-env
    command: uv run python -m owi_api.scheduler
    depends_on:
      db:
        condition: service_healthy

  # Optional road-distance engine. Enable with the "osrm" profile after preparing an
  # OSM extract (see docs/11-deployment.md), then set OWI_OSRM_URL=http://osrm:5000.
  # Without it the routing engine uses straight-line distances.
  osrm:
    image: osrm/osrm-backend:latest
    profiles: [osrm]
    command: osrm-routed --algorithm mld /data/region.osrm
    ports:
      - "5000:5000"
    volumes:
      - ./var/osrm:/data

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
    profiles: [prod]
    environment:
      DASH_DOMAIN: ${DASH_DOMAIN:-localhost:8443}
      APP_DOMAIN: ${APP_DOMAIN:-localhost:8444}
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
      - "8444:8444"
    depends_on:
      - api

volumes:
  db-data:
  minio-data:
  ls-data:
