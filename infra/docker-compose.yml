name: owi

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: owi
      POSTGRES_PASSWORD: owi
      POSTGRES_DB: owi
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: owi
      MINIO_ROOT_PASSWORD: owi-secret-change-me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  db-data:
  minio-data:
