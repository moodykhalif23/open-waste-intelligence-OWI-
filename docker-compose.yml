name: owi

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  labelstudio:
    image: heartexlabs/label-studio:latest
    environment:
      LABEL_STUDIO_USERNAME: ${LABEL_STUDIO_USERNAME}
      LABEL_STUDIO_PASSWORD: ${LABEL_STUDIO_PASSWORD}
      LABEL_STUDIO_USER_TOKEN: ${LABEL_STUDIO_USER_TOKEN}
      # Scripted access uses the preset token above; JWT PATs stay available in the UI.
      LABEL_STUDIO_LEGACY_API_TOKENS_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ls-data:/label-studio/data

volumes:
  db-data:
  minio-data:
  ls-data:
