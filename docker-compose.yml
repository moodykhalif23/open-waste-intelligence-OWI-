name: owi

x-owi-env: &owi-env
  OWI_ENVIRONMENT: production
  OWI_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  OWI_REDIS_URL: redis://redis:6379/0
  OWI_STORAGE_DRIVER: s3
  OWI_S3_ENDPOINT: minio:9000
  OWI_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
  OWI_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  OWI_JWT_SECRET: ${OWI_JWT_SECRET}
  # Optional tuning from .env — without these lines the containers never see them.
  OWI_OSRM_URL: ${OWI_OSRM_URL:-}
  OWI_FUEL_PRICE_KES_PER_L: ${OWI_FUEL_PRICE_KES_PER_L:-0}
  OWI_PUBLIC_API_DELAY_DAYS: ${OWI_PUBLIC_API_DELAY_DAYS:-7}
  OWI_PUBLIC_API_RATE_PER_MIN: ${OWI_PUBLIC_API_RATE_PER_MIN:-60}

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    # Digest-pinned: `latest` mutates under you; a reviewed bump beats a surprise one.
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 12

  labelstudio:
    image: heartexlabs/label-studio:latest@sha256:aa461572e8f9d86a1bf9520c1db620204e86160fd2f80dd7e9d40ac84a8828ea
    restart: unless-stopped
    environment:
      LABEL_STUDIO_USERNAME: ${LABEL_STUDIO_USERNAME}
      LABEL_STUDIO_PASSWORD: ${LABEL_STUDIO_PASSWORD}
      LABEL_STUDIO_USER_TOKEN: ${LABEL_STUDIO_USER_TOKEN}
      # Scripted access uses the preset token above; JWT PATs stay available in the UI.
      LABEL_STUDIO_LEGACY_API_TOKENS_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ls-data:/label-studio/data

  # One-shot: migrations run exactly once per `up`, never raced by app replicas.
  migrate:
    build: ./api
    profiles: [prod]
    environment: *owi-env
    command: uv run alembic upgrade head
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./api
    profiles: [prod]
    restart: unless-stopped
    environment: *owi-env
    command: uv run uvicorn owi_api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: ./api
    profiles: [prod]
    restart: unless-stopped
    environment: *owi-env
    command: uv run rq worker inference --url redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  scheduler:
    build: ./api
    profiles: [prod]
    restart: unless-stopped
    environment: *owi-env
    command: uv run python -m owi_api.scheduler
    depends_on:
      migrate:
        condition: service_completed_successfully

  # Nightly Postgres dumps with rotation into ./var/backups/postgres (gitignored).
  # Manual run: docker compose exec db-backup /backup.sh — restore via `make restore`.
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    profiles: [prod]
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "14"
      BACKUP_KEEP_WEEKS: "8"
      BACKUP_KEEP_MONTHS: "6"
    volumes:
      - ./var/backups/postgres:/backups
    depends_on:
      db:
        condition: service_healthy

  # Daily image mirror into ./var/backups/minio. Governance: quarantine originals are
  # excluded and deletions propagate (--remove), so erased images never survive in backups.
  minio-backup:
    image: minio/mc:latest@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    profiles: [prod]
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - >
        mc alias set src http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
        while true; do
        mc mirror --overwrite --remove --exclude "quarantine/*" src/${OWI_S3_BUCKET:-owi-images} /backups/${OWI_S3_BUCKET:-owi-images};
        sleep 86400;
        done
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./var/backups/minio:/backups
    depends_on:
      minio:
        condition: service_healthy

  # Optional road-distance engine. Enable with the "osrm" profile after preparing an
  # OSM extract (see docs/11-deployment.md), then set OWI_OSRM_URL=http://osrm:5000.
  # Without it the routing engine uses straight-line distances.
  osrm:
    image: osrm/osrm-backend:v5.27.1
    profiles: [osrm]
    restart: unless-stopped
    command: osrm-routed --algorithm mld /data/region.osrm
    ports:
      - "5000:5000"
    volumes:
      - ./var/osrm:/data

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
    profiles: [prod]
    restart: unless-stopped
    environment:
      DASH_DOMAIN: ${DASH_DOMAIN:-localhost:8443}
      APP_DOMAIN: ${APP_DOMAIN:-localhost:8444}
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
      - "8444:8444"
    depends_on:
      - api

volumes:
  db-data:
  minio-data:
  ls-data:
